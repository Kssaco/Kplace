<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar - KPlace</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
    <h1>KPlace</h1>
    <h2>Publique seu produto gratuitamente!</h2>

    <nav>
        <a href="index.html">Início</a>
        <a href="index2.html">Produtos</a>
        <a href="index3.html">Anunciar</a>
        <a href="index4.html">Login</a>
    </nav>
</header>

<main>

<section>

<h2>Novo Anúncio</h2>

<form>

<label for="nome">Nome do Produto</label>
<input type="text" id="nome" placeholder="Ex: Notebook Dell">

<label for="categoria">Categoria</label>
<input type="text" id="categoria" placeholder="Eletrônicos">

<label for="preco">Preço</label>
<input type="text" id="preco" placeholder="R$ 0,00">

<label for="descricao">Descrição</label>
<textarea id="descricao" rows="5" placeholder="Descreva seu produto"></textarea>

<label for="foto">Foto do Produto</label>
<input type="file" id="foto">

<button type="submit">
Publicar Anúncio
</button>

</form>

</section>

</main>

<footer>
<p>&copy; 2026 KPlace</p>
</footer>

<script src="script.js"></script>

</body>
</html>
